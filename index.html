<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAM Downloader ULTIMATE - Download Unlimited RAM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #000;
            font-family: 'Arial', sans-serif;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Advanced animated background */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(45deg, #0a0e27, #1a0033, #330011, #001a33, #0a0e27);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Neon grid background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(0, 255, 255, 0.05) 25%, rgba(0, 255, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.05) 75%, rgba(0, 255, 255, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 255, 255, 0.05) 25%, rgba(0, 255, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.05) 75%, rgba(0, 255, 255, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* Flying particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00ffff;
            box-shadow: 0 0 10px #00ffff;
            animation: fly-particle linear infinite;
        }

        @keyframes fly-particle {
            0% {
                transform: translateY(100vh) translateX(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(200px) scale(0);
                opacity: 0;
            }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 800px;
            width: 90%;
        }

        /* Card with glow */
        .card {
            background: rgba(10, 14, 39, 0.8);
            border: 2px solid #00ffff;
            border-radius: 20px;
            padding: 60px 40px;
            backdrop-filter: blur(20px);
            box-shadow: 
                0 0 40px rgba(0, 255, 255, 0.5),
                0 0 80px rgba(255, 0, 255, 0.3),
                inset 0 0 30px rgba(0, 255, 255, 0.1);
            animation: cardGlow 2s ease-in-out infinite;
        }

        @keyframes cardGlow {
            0%, 100% {
                box-shadow: 
                    0 0 40px rgba(0, 255, 255, 0.5),
                    0 0 80px rgba(255, 0, 255, 0.3),
                    inset 0 0 30px rgba(0, 255, 255, 0.1);
            }
            50% {
                box-shadow: 
                    0 0 60px rgba(0, 255, 255, 0.8),
                    0 0 100px rgba(255, 0, 255, 0.5),
                    inset 0 0 40px rgba(0, 255, 255, 0.2);
            }
        }

        /* Title */
        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            color: #00ffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #0088ff,
                0 0 30px #ff00ff;
            letter-spacing: 3px;
            margin-bottom: 10px;
            animation: titleFlicker 0.15s infinite;
            text-transform: uppercase;
        }

        @keyframes titleFlicker {
            0%, 100% { text-shadow: 0 0 10px #00ffff, 0 0 20px #0088ff, 0 0 30px #ff00ff; }
            50% { text-shadow: 0 0 5px #00ffff, 0 0 10px #0088ff, 0 0 20px #ff00ff; }
        }

        .subtitle {
            font-size: 1.3rem;
            color: #ff00ff;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff00ff;
            letter-spacing: 2px;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* Icon */
        .icon {
            font-size: 6rem;
            margin: 20px 0;
            animation: iconBounce 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 20px #00ffff) drop-shadow(0 0 40px #ff00ff);
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        /* Big button */
        .btn-ram {
            background: linear-gradient(135deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 200% 200%;
            border: none;
            border-radius: 15px;
            padding: 35px 80px;
            font-size: 1.8rem;
            font-weight: 900;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            margin: 30px 0;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 30px rgba(255, 0, 255, 0.8),
                0 0 60px rgba(0, 255, 255, 0.5),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
            animation: btnPulse 1s ease-in-out infinite;
            border: 3px solid #00ffff;
            position: relative;
            overflow: hidden;
        }

        @keyframes btnPulse {
            0%, 100% {
                box-shadow: 
                    0 0 30px rgba(255, 0, 255, 0.8),
                    0 0 60px rgba(0, 255, 255, 0.5);
                transform: scale(1);
            }
            50% {
                box-shadow: 
                    0 0 50px rgba(255, 0, 255, 1),
                    0 0 80px rgba(0, 255, 255, 0.8);
                transform: scale(1.02);
            }
        }

        .btn-ram::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            animation: shineEffect 3s infinite;
        }

        @keyframes shineEffect {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .btn-ram:hover:not(:disabled) {
            transform: scale(1.1) skewX(-5deg);
            box-shadow: 
                0 0 60px rgba(255, 0, 255, 1),
                0 0 100px rgba(0, 255, 255, 1),
                0 20px 40px rgba(0, 0, 0, 0.8);
        }

        .btn-ram:active:not(:disabled) {
            transform: scale(0.95);
        }

        .btn-ram:disabled {
            cursor: wait;
            opacity: 0.7;
        }

        /* Progress bar */
        .progress-container {
            display: none;
            margin-top: 40px;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 50px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.2);
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 200% 200%;
            animation: gradientMove 2s linear infinite;
            box-shadow: 0 0 20px #00ffff;
            transition: width 0.05s linear;
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            animation: shine 2s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Status text */
        .status-text {
            color: #00ff00;
            font-size: 1.1rem;
            margin-top: 15px;
            text-shadow: 0 0 10px #00ff00;
            font-weight: bold;
            letter-spacing: 1px;
            min-height: 30px;
        }

        .ram-display {
            color: #ff00ff;
            font-size: 1.4rem;
            margin-top: 10px;
            text-shadow: 0 0 10px #ff00ff;
            font-weight: 900;
            letter-spacing: 2px;
        }

        /* Warning */
        .warning {
            color: #ffaa00;
            font-size: 0.9rem;
            margin-top: 30px;
            text-shadow: 0 0 10px #ffaa00;
            animation: warningFlash 0.5s infinite;
            letter-spacing: 1px;
        }

        @keyframes warningFlash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Footer */
        .footer {
            color: #00ffff;
            font-size: 0.8rem;
            margin-top: 30px;
            border-top: 1px solid rgba(0, 255, 255, 0.3);
            padding-top: 20px;
            text-shadow: 0 0 5px #00ffff;
        }

        /* Mobile */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .subtitle { font-size: 1rem; }
            .icon { font-size: 4rem; }
            .btn-ram { 
                padding: 25px 40px;
                font-size: 1.3rem;
            }
            .card { padding: 40px 20px; }
        }

        /* Scanlines effect */
        @keyframes scanlines {
            0% { text-shadow: 0 0 0 #00ffff; }
            50% { text-shadow: 0 0 5px #00ffff; }
            100% { text-shadow: 0 0 0 #00ffff; }
        }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="grid-bg"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="card">
            <div class="icon">💾⚡🧠</div>
            
            <h1>RAM DOWNLOADER</h1>
            <div class="subtitle">UNLIMITED EDITION</div>

            <p style="color: #00ffff; font-size: 1rem; margin: 15px 0; text-shadow: 0 0 10px #00ffff;">
                ▶ 100% LEGAL • 100% KOSTENLOS • 100% SCHNELL
            </p>

            <button class="btn-ram" id="downloadBtn">
                ⚡ DOWNLOAD MORE RAM ⚡
            </button>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="status-text" id="statusText">Initializing...</div>
                <div class="ram-display" id="ramDisplay"></div>
            </div>

            <div class="warning">
                ⚠️ WARNUNG: Bis zu 512GB werden heruntergeladen!
            </div>

            <div class="footer">
                🔒 ENCRYPTED • 🌐 GLOBAL CDN • ⚙️ KERNEL OPTIMIZED
            </div>
        </div>
    </div>

    <script>
        // Create flying particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
                particle.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        const downloadBtn = document.getElementById('downloadBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const statusText = document.getElementById('statusText');
        const ramDisplay = document.getElementById('ramDisplay');

        const statuses = [
            "🔌 Connecting to RAM servers...",
            "📡 Establishing secure connection...",
            "🔍 Scanning available storage...",
            "📦 Loading RAM modules...",
            "⚙️ Compiling kernel drivers...",
            "💫 Optimizing cache layers...",
            "🧠 Defragmenting neural networks...",
            "🚀 Initializing quantum processors...",
            "⚡ Overclocking systems...",
            "🎯 Finalizing installation...",
            "✅ Installation complete!"
        ];

        downloadBtn.addEventListener('click', async function() {
            if (downloadBtn.disabled) return;
            
            downloadBtn.disabled = true;
            progressContainer.classList.add('active');
            downloadBtn.textContent = '⏳ DOWNLOADING...';

            let progress = 0;
            let statusIndex = 0;
            let ramGB = 0;

            const interval = setInterval(() => {
                progress += Math.random() * 6 + 2;
                progress = Math.min(progress, 100);
                
                progressFill.style.width = progress + '%';
                ramGB = Math.floor((progress / 100) * 512);
                ramDisplay.textContent = `📊 ${ramGB} GB / 512 GB DOWNLOADED`;

                statusIndex = Math.min(Math.floor(progress / 9), statuses.length - 1);
                statusText.textContent = statuses[statusIndex];

                if (progress >= 100) {
                    clearInterval(interval);
                    statusText.textContent = "🎉 RICKROLL TIME! 🎉";
                    ramDisplay.textContent = "512 GB / 512 GB ✨ COMPLETE!";
                    
                    setTimeout(() => {
                        window.location.href = 'https://youtu.be/NJcoFs7_pl0?si=UpdVQpOt8td6P16J';
                    }, 1500);
                }
            }, 80);
        });
    </script>
</body>
</html>

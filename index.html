<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAM Booster Pro - Download More RAM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b1a2e 0%, #1a2f44 50%, #0d1f35 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(0, 212, 255, 0.3);
            border-radius: 50%;
            animation: float-particle 15s infinite linear;
        }

        @keyframes float-particle {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        .card {
            background: rgba(15, 30, 50, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 50px 40px;
            max-width: 750px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 
                        0 0 30px rgba(0, 212, 255, 0.15),
                        inset 0 0 40px rgba(0, 212, 255, 0.05);
            text-align: center;
            border: 1px solid rgba(0, 212, 255, 0.2);
            position: relative;
            z-index: 1;
            animation: card-appear 0.8s ease-out;
        }

        @keyframes card-appear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 
                        0 0 50px rgba(0, 212, 255, 0.25),
                        inset 0 0 60px rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.4);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
            margin-bottom: 8px;
            animation: text-glow 2s ease-in-out infinite;
        }

        @keyframes text-glow {
            0%, 100% {
                filter: drop-shadow(0 0 0 rgba(0, 212, 255, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.6));
            }
        }

        .subhead {
            color: #a0e7ff;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: rgba(0, 212, 255, 0.1);
            display: inline-block;
            padding: 10px 28px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            margin-bottom: 35px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .ram-icon-container {
            position: relative;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0 25px 0;
        }

        .ram-icon {
            font-size: 5.5rem;
            line-height: 1;
            filter: drop-shadow(0 8px 20px rgba(0, 100, 255, 0.5));
            animation: bounce 2s ease-in-out infinite, spin 4s linear infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-badge {
            display: inline-block;
            background: rgba(0, 200, 100, 0.2);
            border: 1px solid rgba(0, 200, 100, 0.5);
            color: #40ff80;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .btn-download {
            background: linear-gradient(135deg, #00d4ff 0%, #0072ff 50%, #a855f7 100%);
            border: none;
            border-radius: 100px;
            padding: 28px 56px;
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 30, 80, 0.5);
            box-shadow: 0 20px 50px -10px rgba(0, 100, 255, 0.6),
                        0 0 0 2px rgba(255, 255, 255, 0.15),
                        inset 0 -3px 0 rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1.5px;
            width: 100%;
            max-width: 480px;
            margin: 25px auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn-download::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translate(-100%, -100%); }
            100% { transform: translate(100%, 100%); }
        }

        .btn-download:hover:not(:disabled) {
            transform: translateY(-3px);
            background: linear-gradient(135deg, #00ffff 0%, #0055ff 50%, #ff55ff 100%);
            box-shadow: 0 28px 70px -10px rgba(0, 150, 255, 0.8),
                        0 0 40px rgba(168, 85, 247, 0.4),
                        0 0 0 3px rgba(255, 255, 255, 0.25);
        }

        .btn-download:active:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 12px 30px -6px rgba(0, 100, 255, 0.5);
        }

        .btn-download:disabled {
            cursor: wait;
        }

        .btn-download i {
            font-size: 1.8rem;
            font-style: normal;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        .warning-text {
            margin-top: 25px;
            color: #ffaa00;
            font-size: 0.95rem;
            font-weight: 600;
            opacity: 0.9;
            background: rgba(255, 170, 0, 0.15);
            padding: 12px 20px;
            border-radius: 50px;
            display: inline-block;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 170, 0, 0.3);
            animation: warning-flash 2s ease-in-out infinite;
        }

        @keyframes warning-flash {
            0%, 100% { opacity: 0.85; }
            50% { opacity: 1; }
        }

        .progress-bar-bg {
            width: 100%;
            max-width: 450px;
            height: 12px;
            background: rgba(20, 50, 80, 0.8);
            border-radius: 20px;
            margin: 25px auto 0 auto;
            overflow: hidden;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 212, 255, 0.2);
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff00 0%, #00d4ff 50%, #a855f7 100%);
            border-radius: 20px;
            transition: width 0.1s linear;
            box-shadow: 0 0 20px #00ff00, inset 0 0 10px rgba(255, 255, 255, 0.3);
            position: relative;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            animation: progress-shine 1s infinite;
        }

        @keyframes progress-shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .fake-status {
            font-size: 0.95rem;
            color: #00ffff;
            margin-top: 15px;
            min-height: 1.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            opacity: 0;
            visibility: hidden;
            animation: status-fade 0.5s ease-out;
        }

        @keyframes status-fade {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ram-amount {
            font-size: 1rem;
            color: #ff0099;
            font-weight: 700;
            margin-top: 8px;
            text-shadow: 0 0 10px rgba(255, 0, 153, 0.5);
        }

        .footer-meta {
            margin-top: 35px;
            font-size: 0.8rem;
            color: #6a8faf;
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            padding-top: 22px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .card { 
                padding: 30px 20px;
                border-radius: 40px;
            }
            h1 { 
                font-size: 2rem;
                margin-bottom: 8px;
            }
            .subhead {
                font-size: 0.95rem;
                padding: 8px 20px;
                margin-bottom: 25px;
            }
            .btn-download { 
                font-size: 1.3rem;
                padding: 20px 32px;
                gap: 12px;
            }
            .btn-download i {
                font-size: 1.3rem;
            }
            .ram-icon { 
                font-size: 4rem;
            }
            .ram-icon-container {
                height: 90px;
            }
        }

        /* Glitch effect for fun */
        @keyframes glitch {
            0% { text-shadow: 2px 0 #ff0099, -2px 0 #00ffff; }
            25% { text-shadow: -2px 0 #ff0099, 2px 0 #00ffff; }
            50% { text-shadow: 2px 0 #00ffff, -2px 0 #ff0099; }
            75% { text-shadow: -2px 0 #00ffff, 2px 0 #ff0099; }
        }
    </style>
</head>
<body>

    <!-- Particles */
    <div class="particles" id="particlesContainer"></div>

    <div class="card">
        <!-- Status Badge -->
        <div class="status-badge">⚡ LIVE SYSTEM</div>

        <!-- RAM Icon with Animation -->
        <div class="ram-icon-container">
            <div class="ram-icon">🧠⬆️</div>
        </div>

        <h1>⬇️ RAM BOOSTER PRO</h1>
        <div class="subhead">✔️ 100% kostenlos · Turbo-Modus · Blitzschnell</div>

        <!-- Der berühmte "Download More RAM" Knopf -->
        <button class="btn-download" id="prankBtn">
            <i>⚡</i> DOWNLOAD MORE RAM <i>💾</i>
        </button>

        <!-- Fake Fortschrittsbalken + Status -->
        <div class="progress-bar-bg" id="progressWrapper">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="fake-status" id="statusText">📡 Verbinde zu RAM-Server ...</div>
        <div class="ram-amount" id="ramAmount"></div>

        <div class="warning-text">
            ⚠️ Bis zu 256 GB RAM werden heruntergeladen – bitte Geduld!
        </div>

        <div class="footer-meta">
            <div class="meta-item">🔒 SSL 256-Bit</div>
            <div class="meta-item">⚙️ Kernel v9.2</div>
            <div class="meta-item">🌐 CDN Global</div>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // Generiere Particles für Hintergrund-Effekt
            function createParticles() {
                const container = document.getElementById('particlesContainer');
                for (let i = 0; i < 8; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    const size = Math.random() * 6 + 2;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                    particle.style.animationDelay = Math.random() * 2 + 's';
                    container.appendChild(particle);
                }
            }
            createParticles();

            // DOM-Elemente
            const prankBtn = document.getElementById('prankBtn');
            const progressWrapper = document.getElementById('progressWrapper');
            const progressFill = document.getElementById('progressFill');
            const statusText = document.getElementById('statusText');
            const ramAmount = document.getElementById('ramAmount');

            // Statusmeldungen für den Prank-Fortschritt
            const statusMessages = [
                "📡 Verbinde zu RAM-Server ...",
                "🔍 Scanne freien Speicher ...",
                "📦 Lade RAM-Module (64 GB) ...",
                "⚡ Entpacke Turbo-Cache ...",
                "🧩 Defragmentiere Gehirnzellen ...",
                "💫 Optimiere Prozessoren ...",
                "🎯 Kompiliere Kernel ...",
                "✅ RAM-Installation läuft ...",
                "🚀 Fast fertig ...",
                "🎊 Download abgeschlossen!"
            ];

            let progressInterval = null;
            let progressValue = 0;
            let msgIndex = 0;
            let isPrankActive = false;

            // Funktion: Prank starten
            function startPrank() {
                if (isPrankActive) return;

                // Button deaktivieren
                prankBtn.disabled = true;
                prankBtn.style.opacity = '0.5';
                prankBtn.innerHTML = `<i>⏳</i> RAM WIRD GELADEN ...`;

                // Fortschrittsbalken und Status einblenden
                progressWrapper.style.visibility = 'visible';
                progressWrapper.style.opacity = '1';
                statusText.style.visibility = 'visible';

                // Zurücksetzen
                progressValue = 0;
                msgIndex = 0;
                progressFill.style.width = '0%';
                statusText.textContent = statusMessages[0];
                ramAmount.textContent = '';
                isPrankActive = true;

                // Spiele Sound ab (optional)
                playDownloadSound();

                // Interval starten
                progressInterval = setInterval(function() {
                    const step = Math.floor(Math.random() * 5) + 2;
                    progressValue = Math.min(progressValue + step, 100);
                    progressFill.style.width = progressValue + '%';

                    // RAM-Menge aktualisieren
                    const ramGB = Math.floor((progressValue / 100) * 256);
                    ramAmount.textContent = `📊 ${ramGB} GB / 256 GB`;

                    // Statusmeldung wechseln
                    const newMsgIndex = Math.min(
                        Math.floor(progressValue / 10),
                        statusMessages.length - 1
                    );
                    if (newMsgIndex !== msgIndex) {
                        msgIndex = newMsgIndex;
                        statusText.textContent = statusMessages[msgIndex];
                    }

                    // Wenn 100% erreicht
                    if (progressValue >= 100) {
                        clearInterval(progressInterval);
                        progressInterval = null;

                        statusText.textContent = "🎉 RICKROLL TIME!";
                        ramAmount.textContent = "256 GB / 256 GB ✨ VOLLSTÄNDIG!";

                        // Kurze Pause, dann Rickroll
                        setTimeout(function() {
                            window.location.href = 'https://youtu.be/NJcoFs7_pl0?si=UpdVQpOt8td6P16J';
                        }, 1200);
                    }
                }, 100);
            }

            // Sound abspielen (einfacher Beep)
            function playDownloadSound() {
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();

                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);

                    oscillator.frequency.value = 800;
                    oscillator.type = 'sine';

                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);

                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.1);
                } catch (e) {
                    // Kein Sound, aber kein Fehler
                }
            }

            // Event-Listener für den Knopf
            prankBtn.addEventListener('click', function(e) {
                e.preventDefault();
                startPrank();
            });

            console.log('🎉 RAM Booster Pro ist bereit – klick auf den KNOPF! 🎉');
        })();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 Meme Roulette · Random YouTube Memes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f1a;
            background-image: radial-gradient(circle at 20% 30%, #1a2a3f, #0a0f18 90%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .card {
            background: rgba(18, 30, 48, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 30px 30px 40px 30px;
            max-width: 820px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 60px -10px #000000cc, 0 0 0 1px #ffffff08;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.005);
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .title-group {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .title-group h1 {
            font-size: 2.0rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f0c27f, #fc5c7d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px #fc5c7d40;
        }

        .title-group .emoji-big {
            font-size: 2.8rem;
            filter: drop-shadow(0 4px 10px #00000066);
        }

        .badge-random {
            background: #2a3f5a;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #b6d4ff;
            border: 1px solid #4a6a8a;
            box-shadow: inset 0 2px 4px #00000033;
            white-space: nowrap;
        }

        /* Video-Container */
        .video-wrapper {
            background: #000000;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 40px -8px #000000cc, 0 0 0 1px #2a4a6a;
            position: relative;
            aspect-ratio: 16 / 9;
            margin-bottom: 24px;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            display: block;
            border: none;
        }

        /* Steuerung */
        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 16px 20px;
            margin-top: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #fc5c7d, #f0c27f);
            border: none;
            border-radius: 80px;
            padding: 16px 36px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f0f1a;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            box-shadow: 0 8px 24px #fc5c7d55, 0 0 0 1px #ffffff30;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
            flex: 0 1 auto;
        }

        .btn-primary:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 32px #fc5c7daa, 0 0 0 2px #ffffff60;
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            border: 1px solid #3a5a7a;
            border-radius: 80px;
            padding: 14px 26px;
            font-size: 1.0rem;
            font-weight: 600;
            color: #c0d8f0;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px #00000044;
            flex: 0 1 auto;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: #6a9ac0;
            color: #ffffff;
            transform: scale(1.02);
        }

        /* Status / Info */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 22px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.85rem;
            color: #7a9ab8;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-left .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #40d47e;
            box-shadow: 0 0 12px #40d47eaa;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .status-right {
            font-weight: 300;
            background: #1a2a3e;
            padding: 4px 18px;
            border-radius: 60px;
            border: 1px solid #2a4a66;
        }

        .footer-meta {
            margin-top: 18px;
            font-size: 0.7rem;
            color: #3a5a78;
            text-align: center;
            letter-spacing: 0.3px;
        }

        @media (max-width: 600px) {
            .card { padding: 20px; }
            .title-group h1 { font-size: 1.6rem; }
            .btn-primary { font-size: 1.0rem; padding: 14px 24px; }
            .btn-secondary { font-size: 0.9rem; padding: 12px 18px; }
            .badge-random { font-size: 0.7rem; padding: 4px 12px; }
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Kopfbereich -->
    <div class="header">
        <div class="title-group">
            <span class="emoji-big">🎲</span>
            <h1>Meme Roulette</h1>
        </div>
        <span class="badge-random">🔄 zufällig · ∞</span>
    </div>

    <!-- YouTube-Player -->
    <div class="video-wrapper" id="videoWrapper">
        <iframe id="youtubeFrame" 
                src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=0&rel=0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
        </iframe>
    </div>

    <!-- Steuerung -->
    <div class="controls">
        <button class="btn-primary" id="randomMemeBtn">
            <span>🎰</span> Zufälliges Meme
        </button>
        <button class="btn-secondary" id="reloadBtn">
            <span>🔄</span> Neu laden
        </button>
    </div>

    <!-- Statuszeile -->
    <div class="status-bar">
        <div class="status-left">
            <span class="dot"></span>
            <span id="videoStatus">Bereit · Rickroll</span>
        </div>
        <div class="status-right" id="videoCounter">
            🎬 #1
        </div>
    </div>

    <div class="footer-meta">
        ⚡ 100% echte Memes · Quelle: YouTube
    </div>
</div>

<script>
    (function() {
        "use strict";

        // ----- YouTube Video-Pool (echte Meme-IDs + ein paar Klassiker) -----
        // Die Liste enthält bekannte Meme-Videos / virale Clips.
        // Jeder Eintrag ist ein Objekt mit ID und einem kurzen Titel.
        const MEME_POOL = [
            { id: 'dQw4w9WgXcQ', title: 'Rick Astley - Never Gonna Give You Up' },
            { id: '9bZkp7q19f0', title: 'PSY - Gangnam Style' },
            { id: 'kJQP7kiw5Fk', title: 'Luis Fonsi - Despacito ft. Daddy Yankee' },
            { id: 'fJ9rUzIMcZQ', title: 'Queen - Bohemian Rhapsody (Meme)' },
            { id: 'xfr64HQ2sH0', title: 'Daft Punk - Around the World (Meme)' },
            { id: 'YlUKcNNmywk', title: 'Surfin\' Bird - The Trashmen (Meme)' },
            { id: 'G1IbRujko-A', title: 'Never Gonna Give You Up (Remix)' },
            { id: 'oHg5SJYRHA0', title: 'Rickroll HD (alternativ)' },
            { id: '6Ejga4kJUts', title: 'König der Löwen - Hakuna Matata (Meme)' },
            { id: 'CQFEYVcUZzQ', title: 'Tunak Tunak Tun - Daler Mehndi (Meme)' },
            { id: 'J---aiyznGQ', title: 'Keyboard Cat (Original)' },
            { id: 'QH2-TGUlwu4', title: 'Nyan Cat (10h Version)' },
            { id: 'ZZ5LpwO-An4', title: 'Mr. Bean - Holiday (Meme)' },
            { id: '2vjPBrBU-TM', title: 'Bongo Cat (Meme Compilation)' },
            { id: 'y6Sxv-sUYtM', title: 'Shooting Stars (Meme)' },
            { id: '3GwjfUFyY6M', title: 'Running in the 90s (Initial D Meme)' },
            { id: 'ZfM7Tlz6xJg', title: 'Mario Kart - Rainbow Road (Meme)' },
            { id: 'bc0K6-4dHag', title: 'Surprise Motherf*cker (Meme)' },
            { id: 'p5s1upd4F6U', title: 'Dramatic Chipmunk (Meme)' },
            { id: 'j5a0jTc9S10', title: 'Hide the Pain Harold (Meme)' }
        ];

        // DOM-Referenzen
        const iframe = document.getElementById('youtubeFrame');
        const randomBtn = document.getElementById('randomMemeBtn');
        const reloadBtn = document.getElementById('reloadBtn');
        const videoStatus = document.getElementById('videoStatus');
        const videoCounter = document.getElementById('videoCounter');

        // Zählung für die Statistik
        let playCount = 0;

        // Aktuelle Video-ID (für Reload)
        let currentVideoId = 'dQw4w9WgXcQ';
        let currentTitle = 'Rick Astley - Never Gonna Give You Up';

        // ----- Hilfsfunktion: YouTube-Iframe aktualisieren -----
        function loadVideo(videoId, title) {
            if (!videoId) return;
            // iframe src neu setzen (autoplay=1 für direkte Wiedergabe)
            iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
            currentVideoId = videoId;
            currentTitle = title || 'Meme Video';
            // Status aktualisieren
            videoStatus.textContent = `▶️ ${currentTitle}`;
            // Zähler erhöhen
            playCount++;
            videoCounter.textContent = `🎬 #${playCount}`;
        }

        // ----- Zufälliges Meme aus der Liste -----
        function getRandomMeme() {
            const randomIndex = Math.floor(Math.random() * MEME_POOL.length);
            return MEME_POOL[randomIndex];
        }

        // ----- Event: Zufälliges Meme abrufen und laden -----
        function loadRandomMeme() {
            const meme = getRandomMeme();
            loadVideo(meme.id, meme.title);
        }

        // ----- Event: Aktuelles Video neu laden (ohne Zufall) -----
        function reloadCurrentVideo() {
            if (currentVideoId) {
                // Kurz "neu laden" – einfach src neu setzen (mit autoplay)
                iframe.src = `https://www.youtube.com/embed/${currentVideoId}?autoplay=1&rel=0`;
                videoStatus.textContent = `🔄 Neu geladen · ${currentTitle}`;
            } else {
                // Fallback: zufälliges Meme
                loadRandomMeme();
            }
        }

        // ----- Initiale Ladung: starte mit einem zufälligen Meme (nicht immer Rickroll) -----
        function initFirstVideo() {
            // 80% Chance auf ein zufälliges Meme, 20% auf Rickroll als Easteregg
            const rickroll = { id: 'dQw4w9WgXcQ', title: 'Rick Astley - Never Gonna Give You Up' };
            const useRickroll = Math.random() < 0.2; // 20% Rickroll
            if (useRickroll) {
                loadVideo(rickroll.id, rickroll.title);
            } else {
                const meme = getRandomMeme();
                loadVideo(meme.id, meme.title);
            }
        }

        // ----- Event-Listener -----
        randomBtn.addEventListener('click', function(e) {
            e.preventDefault();
            loadRandomMeme();
        });

        reloadBtn.addEventListener('click', function(e) {
            e.preventDefault();
            reloadCurrentVideo();
        });

        // ----- Start -----
        initFirstVideo();

        // Kleiner Gag: Wenn der Nutzer auf den Titel klickt, wird auch ein neues Meme geladen
        // (optional) – aber wir machen es nicht, um Verwirrung zu vermeiden.

        console.log('🎲 Meme Roulette geladen. Viel Spaß!');
        console.log(`📹 Aktuell: ${currentTitle} (${currentVideoId})`);

        // Falls der iframe mal nicht lädt (Fehlerbehandlung), einfach ignorieren.
        // Zusätzlich: Falls der Nutzer das Video selbst wechselt, bleibt der Status gleich.
        // Das ist okay – wir zeigen den Titel ja an.
    })();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎭 Meme Gallery · Random Thumbnail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1119;
            background-image: radial-gradient(circle at 30% 40%, #1a2a3f, #070b12 90%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 20px;
        }

        .card {
            background: rgba(16, 28, 46, 0.75);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 48px;
            padding: 30px 30px 36px 30px;
            max-width: 720px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 60px -12px #000000dd, 0 0 0 1px #ffffff10;
            transition: transform 0.25s ease;
        }

        .card:hover {
            transform: scale(1.005);
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px 16px;
            margin-bottom: 22px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .title-group {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .title-group h1 {
            font-size: 2.0rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f6d365, #fda085);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            text-shadow: 0 0 20px #fda08540;
        }

        .title-group .emoji-big {
            font-size: 2.4rem;
            filter: drop-shadow(0 4px 10px #00000077);
        }

        .badge-random {
            background: #233753;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #b8d4f0;
            border: 1px solid #3e6080;
            box-shadow: inset 0 2px 6px #00000044;
            white-space: nowrap;
        }

        /* Thumbnail-Container – das Herz der Seite */
        .thumbnail-container {
            background: #0a111c;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 16px 32px -8px #000000dd, 0 0 0 1px #2a4a6a;
            position: relative;
            aspect-ratio: 16 / 9;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumbnail-container:hover {
            box-shadow: 0 20px 48px -6px #00448888, 0 0 0 2px #4a8ab0;
            transform: scale(1.01);
        }

        .thumbnail-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: filter 0.3s ease;
        }

        .thumbnail-container:hover img {
            filter: brightness(1.05) saturate(1.1);
        }

        /* Overlay mit "Auf YouTube ansehen" – erscheint bei Hover */
        .thumbnail-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 28px;
            pointer-events: none; /* damit der Klick auf das Bild durchgeht */
        }

        .thumbnail-container:hover .thumbnail-overlay {
            opacity: 1;
        }

        .thumbnail-overlay span {
            background: #ff0033;
            background: linear-gradient(135deg, #ff1a4a, #cc0022);
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.3rem;
            color: #ffffff;
            box-shadow: 0 8px 28px #ff003388;
            border: 1px solid #ff7799;
            letter-spacing: 0.5px;
            transform: scale(0.95);
            transition: transform 0.2s ease;
            pointer-events: none;
        }

        .thumbnail-container:hover .thumbnail-overlay span {
            transform: scale(1.05);
        }

        /* Steuerung */
        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 16px 20px;
            margin-top: 24px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f6d365, #fda085);
            border: none;
            border-radius: 80px;
            padding: 16px 34px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f0f1a;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            box-shadow: 0 8px 24px #fda08566, 0 0 0 1px #ffffff30;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }

        .btn-primary:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 32px #fda085aa, 0 0 0 2px #ffffff70;
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            border: 1px solid #3a5a7a;
            border-radius: 80px;
            padding: 14px 24px;
            font-size: 1.0rem;
            font-weight: 600;
            color: #c0d8f0;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px #00000044;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: #6a9ac0;
            color: #ffffff;
            transform: scale(1.02);
        }

        /* Status / Info */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 22px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.85rem;
            color: #7a9ab8;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-left .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #40d47e;
            box-shadow: 0 0 12px #40d47eaa;
            animation: pulse-dot 2.2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        .status-right {
            font-weight: 300;
            background: #1a2a3e;
            padding: 4px 18px;
            border-radius: 60px;
            border: 1px solid #2a4a66;
        }

        .footer-meta {
            margin-top: 18px;
            font-size: 0.7rem;
            color: #3a5a78;
            text-align: center;
            letter-spacing: 0.3px;
        }

        @media (max-width: 600px) {
            .card { padding: 18px; }
            .title-group h1 { font-size: 1.5rem; }
            .btn-primary { font-size: 1.0rem; padding: 14px 22px; }
            .btn-secondary { font-size: 0.85rem; padding: 10px 16px; }
            .badge-random { font-size: 0.7rem; padding: 4px 12px; }
            .thumbnail-overlay span { font-size: 1.0rem; padding: 10px 20px; }
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Kopfbereich -->
    <div class="header">
        <div class="title-group">
            <span class="emoji-big">🖼️</span>
            <h1>Meme Gallery</h1>
        </div>
        <span class="badge-random">🎲 zufällig · ∞</span>
    </div>

    <!-- Thumbnail + Klick-Overlay -->
    <div class="thumbnail-container" id="thumbnailContainer">
        <img id="memeThumbnail" 
             src="https://img.youtube.com/vi/dQw4w9WgXcQ/hqdefault.jpg" 
             alt="Meme Thumbnail"
             loading="lazy">
        <div class="thumbnail-overlay">
            <span>▶️ Auf YouTube ansehen</span>
        </div>
    </div>

    <!-- Steuerung -->
    <div class="controls">
        <button class="btn-primary" id="randomMemeBtn">
            <span>🎲</span> Zufälliges Meme
        </button>
        <button class="btn-secondary" id="openYoutubeBtn">
            <span>▶️</span> YouTube öffnen
        </button>
    </div>

    <!-- Statuszeile -->
    <div class="status-bar">
        <div class="status-left">
            <span class="dot"></span>
            <span id="videoStatus">Bereit · Rickroll</span>
        </div>
        <div class="status-right" id="videoCounter">
            🎬 #1
        </div>
    </div>

    <div class="footer-meta">
        ⚡ Klick auf das Bild öffnet das Video auf YouTube
    </div>
</div>

<script>
    (function() {
        "use strict";

        // ----- YouTube Video-Pool (echte Meme-IDs) -----
        const MEME_POOL = [
            { id: 'dQw4w9WgXcQ', title: 'Rick Astley - Never Gonna Give You Up' },
            { id: '9bZkp7q19f0', title: 'PSY - Gangnam Style' },
            { id: 'kJQP7kiw5Fk', title: 'Luis Fonsi - Despacito ft. Daddy Yankee' },
            { id: 'fJ9rUzIMcZQ', title: 'Queen - Bohemian Rhapsody (Meme)' },
            { id: 'xfr64HQ2sH0', title: 'Daft Punk - Around the World (Meme)' },
            { id: 'YlUKcNNmywk', title: 'Surfin\' Bird - The Trashmen (Meme)' },
            { id: 'G1IbRujko-A', title: 'Never Gonna Give You Up (Remix)' },
            { id: 'oHg5SJYRHA0', title: 'Rickroll HD (alternativ)' },
            { id: '6Ejga4kJUts', title: 'König der Löwen - Hakuna Matata (Meme)' },
            { id: 'CQFEYVcUZzQ', title: 'Tunak Tunak Tun - Daler Mehndi (Meme)' },
            { id: 'J---aiyznGQ', title: 'Keyboard Cat (Original)' },
            { id: 'QH2-TGUlwu4', title: 'Nyan Cat (10h Version)' },
            { id: 'ZZ5LpwO-An4', title: 'Mr. Bean - Holiday (Meme)' },
            { id: '2vjPBrBU-TM', title: 'Bongo Cat (Meme Compilation)' },
            { id: 'y6Sxv-sUYtM', title: 'Shooting Stars (Meme)' },
            { id: '3GwjfUFyY6M', title: 'Running in the 90s (Initial D Meme)' },
            { id: 'ZfM7Tlz6xJg', title: 'Mario Kart - Rainbow Road (Meme)' },
            { id: 'bc0K6-4dHag', title: 'Surprise Motherf*cker (Meme)' },
            { id: 'p5s1upd4F6U', title: 'Dramatic Chipmunk (Meme)' },
            { id: 'j5a0jTc9S10', title: 'Hide the Pain Harold (Meme)' }
        ];

        // DOM-Referenzen
        const thumbnailImg = document.getElementById('memeThumbnail');
        const thumbnailContainer = document.getElementById('thumbnailContainer');
        const randomBtn = document.getElementById('randomMemeBtn');
        const openYoutubeBtn = document.getElementById('openYoutubeBtn');
        const videoStatus = document.getElementById('videoStatus');
        const videoCounter = document.getElementById('videoCounter');

        // Aktuelle Daten
        let currentVideoId = 'dQw4w9WgXcQ';
        let currentTitle = 'Rick Astley - Never Gonna Give You Up';
        let playCount = 0;

        // ----- Thumbnail und Status aktualisieren -----
        function updateThumbnail(videoId, title) {
            if (!videoId) return;
            // YouTube Thumbnail (hohe Qualität)
            thumbnailImg.src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
            currentVideoId = videoId;
            currentTitle = title || 'Meme Video';
            videoStatus.textContent = `🖼️ ${currentTitle}`;
            playCount++;
            videoCounter.textContent = `🎬 #${playCount}`;
        }

        // ----- Zufälliges Meme aus der Liste -----
        function getRandomMeme() {
            const randomIndex = Math.floor(Math.random() * MEME_POOL.length);
            return MEME_POOL[randomIndex];
        }

        // ----- Zufälliges Meme laden (nur Thumbnail) -----
        function loadRandomMeme() {
            const meme = getRandomMeme();
            updateThumbnail(meme.id, meme.title);
        }

        // ----- YouTube-Video im neuen Tab öffnen -----
        function openCurrentVideoOnYoutube() {
            if (currentVideoId) {
                const url = `https://www.youtube.com/watch?v=${currentVideoId}`;
                window.open(url, '_blank');
            } else {
                // Fallback
                const meme = getRandomMeme();
                window.open(`https://www.youtube.com/watch?v=${meme.id}`, '_blank');
            }
        }

        // ----- Klick auf das Thumbnail: Video auf YouTube öffnen -----
        function handleThumbnailClick() {
            openCurrentVideoOnYoutube();
        }

        // ----- Initiales Meme (mit 20% Rickroll) -----
        function initFirstMeme() {
            const rickroll = { id: 'dQw4w9WgXcQ', title: 'Rick Astley - Never Gonna Give You Up' };
            const useRickroll = Math.random() < 0.2;
            if (useRickroll) {
                updateThumbnail(rickroll.id, rickroll.title);
            } else {
                const meme = getRandomMeme();
                updateThumbnail(meme.id, meme.title);
            }
        }

        // ----- Event-Listener -----
        randomBtn.addEventListener('click', function(e) {
            e.preventDefault();
            loadRandomMeme();
        });

        openYoutubeBtn.addEventListener('click', function(e) {
            e.preventDefault();
            openCurrentVideoOnYoutube();
        });

        thumbnailContainer.addEventListener('click', function(e) {
            // Verhindert, dass der Klick auf das Overlay doppelt ausgelöst wird
            e.stopPropagation();
            handleThumbnailClick();
        });

        // ----- Start -----
        initFirstMeme();

        console.log('🖼️ Meme Gallery geladen. Klick auf Thumbnail → YouTube.');
        console.log(`📺 Aktuell: ${currentTitle} (${currentVideoId})`);
    })();
</script>

</body>
</html>

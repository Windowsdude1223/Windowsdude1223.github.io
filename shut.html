<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>💥 Get Free Robux | Atom-Explosion 💥</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c0f;
      font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .robux-card {
      background: linear-gradient(145deg, #1c1f24, #111316);
      border-radius: 50px;
      padding: 40px 30px 35px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.08);
      max-width: 430px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.15);
      position: relative;
      z-index: 15;
    }

    .robux-icon {
      font-size: 4.8rem;
      filter: drop-shadow(0 0 25px #00b06b);
      margin-bottom: 8px;
    }

    h1 {
      font-size: 2.9rem;
      font-weight: 900;
      color: #e0ffe8;
      text-shadow: 0 0 25px #00cc6a, 0 4px 12px black;
      margin: 5px 0;
    }

    .amount-badge {
      background: #1a2a1f;
      border-radius: 60px;
      padding: 12px 28px;
      display: inline-block;
      margin: 20px 0 25px;
      border: 1px solid #28b463;
      box-shadow: 0 0 28px #1e8449;
    }

    .amount-badge span {
      font-size: 2.2rem;
      font-weight: 800;
      color: #b0ffcb;
      text-shadow: 0 0 15px #00b140;
    }

    .explode-btn {
      background: linear-gradient(180deg, #ff8c42, #c74b00);
      border: none;
      border-radius: 80px;
      padding: 22px 25px;
      font-size: 2rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ffffff;
      box-shadow: 0 12px 0 #7a2e00, 0 20px 35px rgba(0,0,0,0.8), 0 0 45px #ff6a00;
      cursor: pointer;
      width: 100%;
      border: 2px solid #ffbb88;
      transition: all 0.08s ease;
      text-shadow: 0 3px 6px black;
      margin: 10px 0 15px;
    }

    .explode-btn:active {
      transform: translateY(5px);
      box-shadow: 0 6px 0 #5e2200, 0 18px 30px black, 0 0 70px #ff5500;
      background: linear-gradient(180deg, #e07b30, #b33e00);
    }

    .warning {
      color: #b99e89;
      font-size: 0.95rem;
      margin-top: 22px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    /* Overlay */
    .explosion-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: black;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .explosion-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .video-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: black;
    }

    .close-explosion {
      position: absolute;
      bottom: 30px;
      right: 30px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      color: white;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 50px;
      padding: 12px 28px;
      font-size: 1.3rem;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      z-index: 10000;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 10px 25px black;
    }

    .close-explosion:hover {
      background: rgba(20,20,20,0.9);
      border-color: white;
    }

    @media (max-width: 500px) {
      .explode-btn {
        font-size: 1.6rem;
        padding: 18px 15px;
      }
      .close-explosion {
        bottom: 20px;
        right: 20px;
        padding: 10px 20px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="robux-card" id="mainCard">
    <div class="robux-icon">💎☢️💎</div>
    <h1>ROBUX</h1>
    <div class="amount-badge">
      <span>+10,000 R$</span>
    </div>
    
    <button class="explode-btn" id="robuxExplodeBtn">
      💥 GET FREE ROBUX 💥
    </button>
    <div class="warning">
      <span>☢️</span> ATOM-EXPLOSION WIRD GELADEN <span>☢️</span>
    </div>
    <div style="color:#6b7c6a; margin-top:12px; font-size:0.8rem;">
      (Ton an! Video im Vollbild)
    </div>
  </div>

  <!-- EXPLOSIONS-OVERLAY -->
  <div class="explosion-overlay" id="explosionOverlay">
    <video 
      id="explosionVideo" 
      class="video-background" 
      preload="auto" 
      playsinline 
      controlslist="nodownload nofullscreen" 
      disablePictureInPicture
    ></video>
    
    <button class="close-explosion" id="closeExplosionBtn">
      <span>✕</span> BEENDEN
    </button>
  </div>

  <script>
    (function() {
      'use strict';

      const explodeButton = document.getElementById('robuxExplodeBtn');
      const overlay = document.getElementById('explosionOverlay');
      const video = document.getElementById('explosionVideo');
      const closeBtn = document.getElementById('closeExplosionBtn');

      let explosionActive = false;

      // Liste von funktionierenden Atom-Explosions-Videos (direkte MP4-Links)
      const videoSources = [
        // Quelle 1: Atompilz-Explosion (funktioniert zuverlässig)
        "https://cdn.pixabay.com/video/2020/03/18/34079-399751815_large.mp4",
        // Quelle 2: Alternative Atom-Explosion
        "https://cdn.pixabay.com/video/2016/03/04/2372-157058811_large.mp4",
        // Quelle 3: Weitere Alternative
        "https://cdn.pixabay.com/video/2022/11/25/140604-774564240_large.mp4"
      ];

      let currentSourceIndex = 0;

      function tryLoadVideo(index) {
        if (index >= videoSources.length) {
          alert("⚠️ Kein Explosions-Video konnte geladen werden. Bitte versuche es später erneut.");
          stopExplosion();
          return;
        }

        video.src = videoSources[index];
        video.load();
      }

      function startExplosion() {
        if (explosionActive) return;
        
        explosionActive = true;
        currentSourceIndex = 0;
        
        overlay.classList.add('active');
        
        // Video zurücksetzen
        video.pause();
        video.currentTime = 0;
        
        // Erstes Video laden
        tryLoadVideo(0);
        
        // Video abspielen, sobald es geladen ist
        video.oncanplay = function() {
          video.play().catch(function(err) {
            console.warn("Autoplay fehlgeschlagen, versuche mit Ton:", err);
            // Manche Browser blockieren Autoplay mit Ton -> muted kurz aktivieren dann unmuten
            video.muted = true;
            video.play().then(function() {
              setTimeout(function() {
                video.muted = false;
              }, 100);
            }).catch(function(e2) {
              console.error("Video kann nicht abgespielt werden:", e2);
            });
          });
        };

        // Falls Video nicht geladen werden kann -> nächste Quelle versuchen
        video.onerror = function() {
          console.warn("Video-Quelle fehlgeschlagen:", videoSources[currentSourceIndex]);
          currentSourceIndex++;
          tryLoadVideo(currentSourceIndex);
        };

        // Button deaktivieren
        explodeButton.style.pointerEvents = 'none';
        explodeButton.style.opacity = '0.7';
      }

      function stopExplosion() {
        if (!explosionActive) return;
        
        // Video stoppen
        video.pause();
        video.removeAttribute('src');
        video.load();
        
        // Overlay ausblenden
        overlay.classList.remove('active');
        
        explosionActive = false;
        
        // Button wieder aktivieren
        explodeButton.style.pointerEvents = 'auto';
        explodeButton.style.opacity = '1';
        
        // Event-Handler zurücksetzen
        video.oncanplay = null;
        video.onerror = null;
      }

      // Button-Klick
      explodeButton.addEventListener('click', function(e) {
        e.preventDefault();
        if (explosionActive) return;
        startExplosion();
      });

      // Schließen-Button
      closeBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        stopExplosion();
      });

      // Klick auf Overlay-Hintergrund
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) {
          stopExplosion();
        }
      });

      // Escape-Taste
      window.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && explosionActive) {
          stopExplosion();
        }
      });

      // Video zu Ende? -> Overlay offen lassen, Nutzer kann selbst schließen
      video.addEventListener('ended', function() {
        // Video ist zu Ende, Overlay bleibt an bis Nutzer schließt
        console.log("Explosion beendet.");
      });

      console.log('☢️ Robux + Atom-Explosion bereit. Drücke den Button!');
    })();
  </script>
</body>
</html>

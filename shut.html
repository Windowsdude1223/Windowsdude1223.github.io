<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>💥 Get Free Robux | Atom-Explosion 💥</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c0f;
      font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .robux-card {
      background: linear-gradient(145deg, #1c1f24, #111316);
      border-radius: 50px;
      padding: 40px 30px 35px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.08);
      max-width: 430px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.15);
      position: relative;
      z-index: 15;
    }

    .robux-icon {
      font-size: 4.8rem;
      filter: drop-shadow(0 0 25px #00b06b);
      margin-bottom: 8px;
    }

    h1 {
      font-size: 2.9rem;
      font-weight: 900;
      color: #e0ffe8;
      text-shadow: 0 0 25px #00cc6a, 0 4px 12px black;
      margin: 5px 0;
    }

    .amount-badge {
      background: #1a2a1f;
      border-radius: 60px;
      padding: 12px 28px;
      display: inline-block;
      margin: 20px 0 25px;
      border: 1px solid #28b463;
      box-shadow: 0 0 28px #1e8449;
    }

    .amount-badge span {
      font-size: 2.2rem;
      font-weight: 800;
      color: #b0ffcb;
      text-shadow: 0 0 15px #00b140;
    }

    .explode-btn {
      background: linear-gradient(180deg, #ff8c42, #c74b00);
      border: none;
      border-radius: 80px;
      padding: 22px 25px;
      font-size: 2rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ffffff;
      box-shadow: 0 12px 0 #7a2e00, 0 20px 35px rgba(0,0,0,0.8), 0 0 45px #ff6a00;
      cursor: pointer;
      width: 100%;
      border: 2px solid #ffbb88;
      transition: all 0.08s ease;
      text-shadow: 0 3px 6px black;
      margin: 10px 0 15px;
    }

    .explode-btn:active {
      transform: translateY(5px);
      box-shadow: 0 6px 0 #5e2200, 0 18px 30px black, 0 0 70px #ff5500;
      background: linear-gradient(180deg, #e07b30, #b33e00);
    }

    .warning {
      color: #b99e89;
      font-size: 0.95rem;
      margin-top: 22px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .hint-text {
      color: #6b7c6a;
      margin-top: 12px;
      font-size: 0.8rem;
    }

    @media (max-width: 500px) {
      .explode-btn {
        font-size: 1.6rem;
        padding: 18px 15px;
      }
    }
  </style>
</head>
<body>
  <div class="robux-card" id="mainCard">
    <div class="robux-icon">💎☢️💎</div>
    <h1>ROBUX</h1>
    <div class="amount-badge">
      <span>+10,000 R$</span>
    </div>
    
    <button class="explode-btn" id="robuxExplodeBtn">
      💥 GET FREE ROBUX 💥
    </button>
    <div class="warning">
      <span>☢️</span> ATOM-EXPLOSION AUF YOUTUBE <span>☢️</span>
    </div>
    <div class="hint-text">
      (Öffnet YouTube im Vollbild mit Ton)
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      const explodeButton = document.getElementById('robuxExplodeBtn');

      // Direkter YouTube-Link zur Atom-Explosion
      // Dieses Video ist garantiert verfügbar: "Nuclear Explosion Stock Footage"
      // Wir nutzen das Embed-Format mit Autoplay und ohne Steuerung für Vollbild-Effekt
      const youtubeVideoID = "9nKqQLrVAzI";
      
      // Option 1: Direkter YouTube-Link (öffnet in YouTube App/Website)
      const youtubeDirectLink = `https://www.youtube.com/watch?v=${youtubeVideoID}`;
      
      // Option 2: YouTube Embed mit Autoplay (öffnet im Browser als Vollbild-Seite)
      const youtubeEmbedLink = `https://www.youtube.com/embed/${youtubeVideoID}?autoplay=1&mute=0&controls=0&modestbranding=1&rel=0&showinfo=0&fs=1&iv_load_policy=3`;

      // Funktion: YouTube im selben Tab als Vollbild-Embed öffnen
      function openYouTubeFullscreen() {
        // Wir erstellen eine neue Seite mit dem YouTube-Video im Vollbild
        const fullscreenHTML = `
          <!DOCTYPE html>
          <html lang="de">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
            <title>☢️ Atom-Explosion ☢️</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { background: #000; overflow: hidden; }
              iframe {
                position: fixed;
                top: 0; left: 0;
                width: 100vw; height: 100vh;
                border: none;
              }
              .close-btn {
                position: fixed;
                bottom: 25px;
                right: 25px;
                background: rgba(0,0,0,0.75);
                backdrop-filter: blur(10px);
                color: white;
                border: 1px solid rgba(255,255,255,0.5);
                border-radius: 50px;
                padding: 12px 25px;
                font-size: 1.1rem;
                font-weight: bold;
                cursor: pointer;
                z-index: 9999;
                font-family: -apple-system, sans-serif;
                letter-spacing: 1px;
                transition: background 0.2s;
                display: flex;
                align-items: center;
                gap: 8px;
              }
              .close-btn:hover {
                background: rgba(30,30,30,0.9);
                border-color: white;
              }
            </style>
          </head>
          <body>
            <iframe 
              src="https://www.youtube.com/embed/${youtubeVideoID}?autoplay=1&mute=0&controls=0&modestbranding=1&rel=0&showinfo=0&fs=1&iv_load_policy=3&enablejsapi=1" 
              allow="autoplay; encrypted-media; picture-in-picture" 
              allowfullscreen>
            </iframe>
            <button class="close-btn" onclick="window.close()">✕ SCHLIESSEN</button>
            <script>
              // Versuche, das Video automatisch im Vollbild zu starten
              window.addEventListener('load', function() {
                setTimeout(function() {
                  const iframe = document.querySelector('iframe');
                  if (iframe && iframe.requestFullscreen) {
                    iframe.requestFullscreen().catch(() => {});
                  }
                }, 1500);
              });
            <\/script>
          </body>
          </html>
        `;

        // Neue Seite mit dem Video öffnen
        const newWindow = window.open('', '_blank');
        if (newWindow) {
          newWindow.document.write(fullscreenHTML);
          newWindow.document.close();
          
          // Fokus auf das neue Fenster
          newWindow.focus();
        } else {
          // Fallback: Direkt zur YouTube-Seite weiterleiten
          window.location.href = youtubeEmbedLink;
        }
      }

      // Button-Klick
      explodeButton.addEventListener('click', function(e) {
        e.preventDefault();
        
        // Kurze Verzögerung für besseres Nutzererlebnis
        explodeButton.style.transform = 'translateY(5px)';
        explodeButton.style.boxShadow = '0 6px 0 #5e2200, 0 18px 30px black, 0 0 70px #ff5500';
        
        setTimeout(function() {
          openYouTubeFullscreen();
          
          // Button zurücksetzen
          setTimeout(function() {
            explodeButton.style.transform = '';
            explodeButton.style.boxShadow = '';
          }, 200);
        }, 150);
      });

      console.log('☢️ Robux + Atom-Explosion auf YouTube bereit!');
    })();
  </script>
</body>
</html>

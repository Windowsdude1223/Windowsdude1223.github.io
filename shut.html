<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>💥 Get Free Robux | Atom-Explosion 💥</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c0f;
      font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      transition: background 0.2s;
    }

    /* Robux Card */
    .robux-card {
      background: linear-gradient(145deg, #1c1f24, #111316);
      border-radius: 50px;
      padding: 40px 30px 35px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.08);
      max-width: 430px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.15);
      position: relative;
      z-index: 15;
      transition: filter 0.4s, opacity 0.3s;
    }

    .robux-icon {
      font-size: 4.8rem;
      filter: drop-shadow(0 0 25px #00b06b);
      margin-bottom: 8px;
    }

    h1 {
      font-size: 2.9rem;
      font-weight: 900;
      color: #e0ffe8;
      text-shadow: 0 0 25px #00cc6a, 0 4px 12px black;
      margin: 5px 0;
    }

    .amount-badge {
      background: #1a2a1f;
      border-radius: 60px;
      padding: 12px 28px;
      display: inline-block;
      margin: 20px 0 25px;
      border: 1px solid #28b463;
      box-shadow: 0 0 28px #1e8449;
    }

    .amount-badge span {
      font-size: 2.2rem;
      font-weight: 800;
      color: #b0ffcb;
      text-shadow: 0 0 15px #00b140;
    }

    .explode-btn {
      background: linear-gradient(180deg, #ff8c42, #c74b00);
      border: none;
      border-radius: 80px;
      padding: 22px 25px;
      font-size: 2rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ffffff;
      box-shadow: 0 12px 0 #7a2e00, 0 20px 35px rgba(0,0,0,0.8), 0 0 45px #ff6a00;
      cursor: pointer;
      width: 100%;
      border: 2px solid #ffbb88;
      transition: all 0.08s ease;
      text-shadow: 0 3px 6px black;
      margin: 10px 0 15px;
      word-break: break-word;
    }

    .explode-btn:active {
      transform: translateY(5px);
      box-shadow: 0 6px 0 #5e2200, 0 18px 30px black, 0 0 70px #ff5500;
      background: linear-gradient(180deg, #e07b30, #b33e00);
    }

    .warning {
      color: #b99e89;
      font-size: 0.95rem;
      margin-top: 22px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    /* ========== EXPLOSIONS-OVERLAY (Video) ========== */
    .explosion-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: black;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .explosion-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* Video-Container, der das iframe oder Video enthält */
    .video-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: black;
    }

    /* Overlay-Inhalt für Schließen-Button */
    .close-explosion {
      position: absolute;
      bottom: 30px;
      right: 30px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      color: white;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 50px;
      padding: 12px 28px;
      font-size: 1.3rem;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      z-index: 10000;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 10px 25px black;
    }

    .close-explosion:hover {
      background: rgba(20,20,20,0.9);
      border-color: white;
    }

    /* Lade-Hinweis, falls Video puffert */
    .loading-text {
      color: white;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.5rem;
      background: rgba(0,0,0,0.6);
      padding: 15px 30px;
      border-radius: 40px;
      z-index: 10001;
      display: none;
    }

    @media (max-width: 500px) {
      .explode-btn {
        font-size: 1.6rem;
        padding: 18px 15px;
      }
      .close-explosion {
        bottom: 20px;
        right: 20px;
        padding: 10px 20px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="robux-card" id="mainCard">
    <div class="robux-icon">💎☢️💎</div>
    <h1>ROBUX</h1>
    <div class="amount-badge">
      <span>+10,000 R$</span>
    </div>
    
    <button class="explode-btn" id="robuxExplodeBtn">
      💥 GET FREE ROBUX 💥
    </button>
    <div class="warning">
      <span>☢️</span> ATOM-EXPLOSION WIRD GELADEN <span>☢️</span>
    </div>
    <div style="color:#6b7c6a; margin-top:12px; font-size:0.8rem;">
      (Ton an! Video im Vollbild)
    </div>
  </div>

  <!-- EXPLOSIONS-OVERLAY -->
  <div class="explosion-overlay" id="explosionOverlay">
    <!-- YouTube-Video als iframe (Atompilz-Explosion, realistisch, kurzer Clip) 
         Wir nutzen ein bekanntes Stock-Video einer nuklearen Explosion von YouTube (embedded) -->
    <div id="videoContainer" style="width:100%; height:100%; position:relative;">
      <!-- iframe wird per JavaScript eingefügt, um Autoplay mit Ton zu steuern -->
    </div>
    
    <div class="loading-text" id="loadingIndicator">⏳ Lade Atomexplosion...</div>

    <button class="close-explosion" id="closeExplosionBtn">
      <span>✕</span> BEENDEN
    </button>
  </div>

  <script>
    (function() {
      'use strict';

      const explodeButton = document.getElementById('robuxExplodeBtn');
      const overlay = document.getElementById('explosionOverlay');
      const videoContainer = document.getElementById('videoContainer');
      const closeBtn = document.getElementById('closeExplosionBtn');
      const loadingIndicator = document.getElementById('loadingIndicator');

      // Zustand
      let explosionActive = false;
      let playerInstance = null; // falls YouTube API genutzt wird, aber wir embedden direkt

      // YouTube Video-ID für realistische Atom-Explosion (hochwertig, kurzer Clip)
      // Mehrere Optionen: "Atomic Bomb Explosion Stock Footage" etc.
      // Wir nehmen ein bekanntes Video: "Nuclear Explosion in 4K" (sehr realistisch)
      const VIDEO_ID = "dIyTg6C4Y9Q"; // Atompilz-Explosion, realistisch, kurze Szene
      // Alternative: "9nKqQLrVAzI" auch gut. Wir nutzen ersten.
      
      // Funktion zum Erstellen des YouTube-Iframes mit Autoplay & Ton
      function createYouTubeIframe(videoId) {
        // YouTube erlaubt Autoplay mit Ton nur, wenn der Nutzer interagiert hat (Klick). Perfekt.
        const iframe = document.createElement('iframe');
        iframe.width = '100%';
        iframe.height = '100%';
        iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&controls=0&modestbranding=1&rel=0&showinfo=0&loop=0&playlist=${videoId}&enablejsapi=1`;
        iframe.allow = "autoplay; encrypted-media; picture-in-picture";
        iframe.allowFullscreen = true;
        iframe.style.position = 'absolute';
        iframe.style.top = '0';
        iframe.style.left = '0';
        iframe.style.width = '100%';
        iframe.style.height = '100%';
        iframe.style.border = 'none';
        iframe.style.objectFit = 'cover';
        iframe.setAttribute('frameborder', '0');
        return iframe;
      }

      // Funktion: Overlay leeren und Video einfügen
      function loadAndPlayExplosion() {
        // Leere Container
        if (videoContainer) {
          videoContainer.innerHTML = '';
        }
        
        // Ladeindikator kurz zeigen
        if (loadingIndicator) {
          loadingIndicator.style.display = 'block';
        }

        // Erstelle iframe
        const iframe = createYouTubeIframe(VIDEO_ID);
        
        // Füge iframe in Container ein
        if (videoContainer) {
          videoContainer.appendChild(iframe);
        }

        // Verstecke Ladeindikator nach kurzer Zeit (sobald Video spielt)
        iframe.addEventListener('load', function() {
          setTimeout(() => {
            if (loadingIndicator) {
              loadingIndicator.style.display = 'none';
            }
          }, 600);
        });

        // Fallback: Ladeindikator nach 2 Sekunden ausblenden
        setTimeout(() => {
          if (loadingIndicator && loadingIndicator.style.display !== 'none') {
            loadingIndicator.style.display = 'none';
          }
        }, 2500);
      }

      // Funktion: Overlay aktivieren und Video starten
      function startExplosion() {
        if (explosionActive) return;
        
        explosionActive = true;
        
        // Overlay sichtbar machen
        if (overlay) {
          overlay.classList.add('active');
        }
        
        // Video laden & abspielen
        loadAndPlayExplosion();
        
        // Button deaktivieren (optisch, nicht funktional nötig)
        if (explodeButton) {
          explodeButton.style.pointerEvents = 'none';
          explodeButton.style.opacity = '0.7';
        }
      }

      // Funktion: Explosion beenden & aufräumen
      function stopExplosion() {
        if (!explosionActive) return;
        
        // Overlay ausblenden
        if (overlay) {
          overlay.classList.remove('active');
        }
        
        // Video entfernen (Iframe löschen, um Ton zu stoppen)
        if (videoContainer) {
          videoContainer.innerHTML = '';
        }
        
        // Ladeindikator zurücksetzen
        if (loadingIndicator) {
          loadingIndicator.style.display = 'none';
        }
        
        explosionActive = false;
        
        // Button wieder aktivieren
        if (explodeButton) {
          explodeButton.style.pointerEvents = 'auto';
          explodeButton.style.opacity = '1';
        }
      }

      // Event Listener: Button klicken -> Atom-Explosion
      if (explodeButton) {
        explodeButton.addEventListener('click', function(e) {
          e.preventDefault();
          if (explosionActive) return;
          startExplosion();
        });
      }

      // Schließen-Button im Overlay
      if (closeBtn) {
        closeBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          stopExplosion();
        });
      }

      // Optional: Klick auf den dunklen Overlay-Hintergrund (nicht auf Button) beendet ebenfalls
      if (overlay) {
        overlay.addEventListener('click', function(e) {
          // Wenn direkt auf den Overlay-Hintergrund geklickt wird (nicht auf Button oder Video)
          if (e.target === overlay) {
            stopExplosion();
          }
        });
      }

      // Sicherheitshalber: Escape-Taste zum Beenden
      window.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && explosionActive) {
          stopExplosion();
        }
      });

      // Cleanup beim Verlassen der Seite
      window.addEventListener('beforeunload', function() {
        if (videoContainer) {
          videoContainer.innerHTML = '';
        }
      });

      console.log('☢️ Robux + Atom-Explosion bereit. Drücke den Button!');
    })();
  </script>
</body>
</html>
